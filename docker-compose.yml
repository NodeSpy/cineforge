services:
  cineforge:
    build: .
    container_name: cineforge
    ports:
      - "8085:8080"
    environment:
      - APP_SECRET=change-me-to-a-random-secret-string
      - PORT=8080
    volumes:
      - app-data:/data
      # - /path/to/media:/media  # Mount your media library for normalization
    restart: unless-stopped


volumes:
  app-data:
    name: cineforge-data

services:
  radarr-importer:
    build: .
    container_name: radarr-importer
    ports:
      - "8085:8080"
    environment:
      - APP_SECRET=change-me-to-a-random-secret-string
      - PORT=8080
    volumes:
      - app-data:/data
    restart: unless-stopped
    networks:
      - grunklestan_default

networks:
  grunklestan_default:
    external: true

volumes:
  app-data:

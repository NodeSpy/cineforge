services:
  cineforge:
    # image: ghcr.io/<owner>/cineforge:latest  # Uncomment to pull pre-built image instead of building
    build: .
    container_name: cineforge
    ports:
      - "8085:8080"  # Use "127.0.0.1:8085:8080" to restrict to localhost only
    environment:
      - PORT=8080
      # - APP_SECRET=  # Auto-generated and persisted on first run if not set
      # - PUID=1000
      # - PGID=1000
    volumes:
      # Bind mount: data lives on host at /var/lib/cineforge (entrypoint chowns to PUID/PGID)
      - /var/lib/cineforge:/data
      # - /path/to/media:/media  # Mount your media library for normalization
    restart: unless-stopped
